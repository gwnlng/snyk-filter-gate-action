# Test the snyk-filter-gate action: script validation and integration
name: Test
on:
  push:
  pull_request:
    branches: [main, master]
jobs:
  script-tests:
    name: Script validation (filter.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install snyk-filter
        shell: bash
        run: npm install -g snyk-filter@1.3.2

      - name: Run filter.sh tests
        run: |
          chmod +x .github/actions/snyk-filter-gate/filter.sh
          chmod +x tests/filter-test.sh
          export GITHUB_ACTION_PATH="${{ github.workspace }}/.github/actions/snyk-filter-gate"
          export NODE_JQ_SKIP_INSTALL_BINARY=true
          export JQ_PATH="$(which jq)"
          tests/filter-test.sh

  action-with-valid-path:
    name: Action with valid JSON (pass)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Snyk Filter Gate (no matching vulns → pass)
        uses: ./.github/actions/snyk-filter-gate
        with:
          snyk-json-path: tests/fixtures/snyk-sample-no-matching-vulns.json

  action-with-matching-vulns:
    name: Action with matching vulns (fail)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Snyk Filter Gate (matching vulns → fail)
        uses: ./.github/actions/snyk-filter-gate
        with:
          snyk-json-path: tests/fixtures/snyk-sample-with-vulns.json
        id: gate
        continue-on-error: true

      - name: Assert gate failed
        run: |
          if [ "${{ steps.gate.outcome }}" != "failure" ]; then
            echo "Expected gate to fail when matching vulnerabilities are present (outcome was: ${{ steps.gate.outcome }})"
            exit 1
          fi
          echo "Correctly failed when matching vulnerabilities were found"

  action-missing-path:
    name: Action without snyk-json-path (error)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Snyk Filter Gate (missing path → error)
        uses: ./.github/actions/snyk-filter-gate
        with:
          snyk-json-path: ''
        id: gate
        continue-on-error: true

      - name: Assert step failed with required input error
        run: |
          if [ "${{ steps.gate.outcome }}" != "failure" ]; then
            echo "Expected step to fail when snyk-json-path is empty (outcome was: ${{ steps.gate.outcome }})"
            exit 1
          fi
          echo "Correctly failed when snyk-json-path was not provided"

  action-with-invalid-path:
    name: Action with invalid path (error)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Snyk Filter Gate (invalid path → error)
        uses: ./.github/actions/snyk-filter-gate
        with:
          snyk-json-path: tests/fixtures/does-not-exist.json
        id: gate
        continue-on-error: true

      - name: Assert step failed with file not found
        run: |
          if [ "${{ steps.gate.outcome }}" != "failure" ]; then
            echo "Expected step to fail when snyk-json-path points to non-existent file (outcome was: ${{ steps.gate.outcome }})"
            exit 1
          fi
          echo "Correctly failed when snyk-json-path was invalid (file not found)"
