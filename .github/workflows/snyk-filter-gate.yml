# Run snyk-filter on a Snyk JSON file from a downloaded artifact. Reusable via workflow_call.
# The caller must upload the Snyk JSON as an artifact; snyk-json-path is the artifact name.
name: Snyk Filter Gate
on:
  workflow_call:
    inputs:
      snyk-json-path:
        description: 'Name of the uploaded artifact containing the Snyk JSON (e.g. the artifact name used in upload-artifact)'
        required: true
        type: string
      debug:
        description: 'Set to true to enable debug output (DEBUG=* for snyk-filter)'
        required: false
        type: boolean
        default: false
jobs:
  snyk-filter-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Snyk results artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.snyk-json-path }}

      - name: Snyk Filter Gate
        uses: gwnlng/snyk-filter-gate-action/.github/actions/snyk-filter-gate@fix/truncate-to-json
        with:
          snyk-json-path: ${{ format('{0}.json', inputs.snyk-json-path) }}
          debug: ${{ inputs.debug }}
