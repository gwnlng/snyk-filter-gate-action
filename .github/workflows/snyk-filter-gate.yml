# Run snyk-filter on an existing Snyk JSON file. Reusable via workflow_call.
name: Snyk Filter Gate
on:
  workflow_call:
    inputs:
      snyk-json-path:
        description: 'Path to Snyk test JSON file (relative to repo root)'
        required: false
        type: string
        default: 'snyk.json'
      output-json:
        description: 'Output filtered result as JSON'
        required: false
        type: boolean
        default: false
jobs:
  snyk-filter-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Snyk Filter Gate
        uses: ./.github/actions/snyk-filter-gate
        with:
          snyk-json-path: ${{ inputs.snyk-json-path || 'snyk.json' }}
          output-json: ${{ inputs.output-json || 'false' }}
