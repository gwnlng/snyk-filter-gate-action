name: 'Snyk Filter Gate'
description: 'Run snyk-filter on Snyk JSON using the default filter (fixable + exploit)'
inputs:
  snyk-json-path:
    description: 'Path to Snyk test JSON file (leave empty to read from stdin)'
    required: true
    default: 'snyk.json'
  debug:
    description: 'Set to true to enable debug output (sets DEBUG=* for snyk-filter)'
    required: false
    default: 'false'
outputs:
  exit-code:
    description: 'Exit code from snyk-filter (0 pass, 1 fail)'
runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install snyk-filter
      run: npm i -g snyk-filter@1.3.2

    - name: Run snyk-filter gating with transformed JSON results
      id: snyk-filter-gating
      shell: bash
      continue-on-error: true
      run: |
        chmod +x "$GITHUB_ACTION_PATH/filter.sh"
        export NODE_JQ_SKIP_INSTALL_BINARY=true
        export JQ_PATH="$(which jq)"
        "$GITHUB_ACTION_PATH/filter.sh" "${{ inputs.snyk-json-path }}" > "${{ env.OUTPUT_JSON_PATH }}"
        EXIT=$?
        echo "exit-code=$EXIT" >> $GITHUB_OUTPUT
        echo "output-json-path=${{ env.OUTPUT_JSON_PATH }}" >> $GITHUB_ENV
      env:
        GITHUB_ACTION_PATH: ${{ github.action_path }}
        DEBUG: ${{ case(inputs.debug == 'true', '*', '') }}
        OUTPUT_JSON_PATH: ${{ github.action_path }}/snyk-filter-results.json

    - name: Upload snyk-filter results
      id: upload-gating-results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: snyk-filter-transformed-results
        path: ${{ env.OUTPUT_JSON_PATH }}

    - name: Transform snyk-filter results to markdown
      if: always() && steps.upload-gating-results.outcome == 'success'
      run: |
        jq -rf "${{ github.action_path }}/vulnerabilities-table.jq" "$output-json-path" > "${{ env.SUMMARY_MD }}"
        cat "${{ env.SUMMARY_MD }}" >> $GITHUB_STEP_SUMMARY
      env:
        SUMMARY_MD: ${{ github.action_path }}/snyk-filter-results.md

    - name: Return gating result exit code
      if: always()
      run: |
        exit "${{ steps.snyk-filter-gating.outputs.exit-code }}"
