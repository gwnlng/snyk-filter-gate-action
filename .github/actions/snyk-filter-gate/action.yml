name: 'Snyk Filter Gate'
description: 'Run snyk-filter on Snyk JSON using the default filter (fixable + exploit)'
inputs:
  snyk-json-path:
    description: 'Path to Snyk test JSON file (leave empty to read from stdin)'
    required: true
    default: 'snyk.json'
  output-json:
    description: 'Set to true to output filtered result as JSON'
    required: false
    default: 'false'
  json-file-output:
    description: 'Optional path to write snyk-filter stdout (filtered JSON or report). If not set, no file is written.'
    required: false
    default: ''
  error-log-output:
    description: 'Optional path to write snyk-filter stderr (error/log output). If not set, no file is written.'
    required: false
    default: ''
outputs:
  exit-code:
    description: 'Exit code from snyk-filter (0 pass, 1 fail)'
runs:
  using: 'composite'
  steps:
    - name: Install jq
      run: sudo apt-get update && sudo apt-get install -y jq
      shell: bash

    - name: Install snyk-filter from GitHub
      run: |
        git clone --depth 1 https://github.com/snyk-labs/snyk-filter.git /tmp/snyk-filter
        cd /tmp/snyk-filter
        node -e "const p=require('./package.json'); delete p.scripts.prepare; require('fs').writeFileSync('package.json', JSON.stringify(p,null,2))"
        npm install --ignore-scripts
        npm install -g . --ignore-scripts
      shell: bash

    - name: Run snyk-filter
      id: filter
      shell: bash
      run: |
        chmod +x "$GITHUB_ACTION_PATH/filter.sh"
        export NODE_JQ_SKIP_INSTALL_BINARY=true
        export JQ_PATH="$(which jq)"
        "$GITHUB_ACTION_PATH/filter.sh" \
          "${{ inputs.snyk-json-path }}" \
          "${{ inputs.output-json }}" \
          "${{ inputs.json-file-output }}" \
          "${{ inputs.error-log-output }}"
        EXIT=$?
        echo "exit-code=$EXIT" >> $GITHUB_OUTPUT
        exit $EXIT
      env:
        GITHUB_ACTION_PATH: ${{ github.action_path }}
