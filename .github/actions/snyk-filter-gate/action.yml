name: 'Snyk Filter Gate'
description: 'Run snyk-filter on Snyk JSON using the default filter (fixable + exploit)'
inputs:
  snyk-json-path:
    description: 'Path to Snyk test JSON file (leave empty to read from stdin)'
    required: true
    default: 'snyk.json'
  debug:
    description: 'Set to true to enable debug output (sets DEBUG=* for snyk-filter)'
    required: false
    default: 'false'
outputs:
  exit-code:
    description: 'Exit code from snyk-filter (0 pass, 1 fail)'
runs:
  using: 'composite'
  steps:
    # github.action_path can contain './' when the workflow uses uses: ./.github/... ;
    # upload-artifact rejects paths with '.' or '..' segments, so we canonicalize first.
    - name: Resolve action directory
      id: action_paths
      shell: bash
      run: |
        cd -P "${{ github.action_path }}"
        echo "dir=$(pwd -P)" >> "$GITHUB_OUTPUT"

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Install snyk-filter
      shell: bash
      run: npm install -g snyk-filter@1.3.2

    - name: Run snyk-filter gating with transformed JSON results
      id: snyk-filter-gating
      shell: bash
      continue-on-error: true
      run: |
        chmod +x "$GITHUB_ACTION_PATH/filter.sh"
        OUT_JSON="$GITHUB_ACTION_PATH/snyk-filter-results.json"
        # Bash runs with errexit; a non-zero exit from filter.sh would abort the script before EXIT=$? and GITHUB_OUTPUT.
        set +e
        "$GITHUB_ACTION_PATH/filter.sh" "${{ inputs.snyk-json-path }}" "$OUT_JSON"
        EXIT=$?
        set -e
        echo "exit-code=$EXIT" >> "$GITHUB_OUTPUT"
      env:
        GITHUB_ACTION_PATH: ${{ steps.action_paths.outputs.dir }}
        DEBUG: ${{ inputs.debug == 'true' && '*' || '' }}

    - name: Upload snyk-filter results
      id: upload-gating-results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        # Unique per job avoids 409 when several jobs use this action in one workflow run.
        name: snyk-filter-transformed-results-${{ github.job }}
        path: ${{ steps.action_paths.outputs.dir }}/snyk-filter-results.json
        overwrite: true

    - name: Transform snyk-filter results to markdown
      if: always() && steps.upload-gating-results.outcome == 'success'
      shell: bash
      run: |
        jq -rf "$ACTION_DIR/vulnerabilities-table.jq" "$ACTION_DIR/snyk-filter-results.json" > "$SUMMARY_MD"
        cat "$SUMMARY_MD" >> "$GITHUB_STEP_SUMMARY"
      env:
        ACTION_DIR: ${{ steps.action_paths.outputs.dir }}
        SUMMARY_MD: ${{ steps.action_paths.outputs.dir }}/snyk-filter-results.md

    - name: Return gating result exit code
      if: always()
      shell: bash
      run: |
        exit "${{ steps.snyk-filter-gating.outputs.exit-code }}"
