version: 2
customFilters:
  filter: ".vulnerabilities |= map(select((.isUpgradable == true or .isPatchable == true or .severity == \"critical\") and (.\"exploit\" == \"Not Defined\")))"
  pass: "[.vulnerabilities[]? | select((.isUpgradable == true or .isPatchable == true or .severity == \"critical\") and (.\"exploit\" == \"Not Defined\"))] | length"
  msg: "Vulnerabilities found matching exploit/fixable filter"
