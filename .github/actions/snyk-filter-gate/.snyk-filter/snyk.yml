version: 2
customFilters:
  filter: ".vulnerabilities |= map(select((.isUpgradable == true or .isPatchable == true) and (.\"exploit\" == \"Mature\")))"
  pass: "[.vulnerabilities[]? | select((.isUpgradable == true or .isPatchable == true) and (.\"exploit\" == \"Mature\"))] | length"
  msg: "Vulnerabilities found matching exploit/fixable filter"
